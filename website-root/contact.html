<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Get in touch with NexusTech. Reach out for consultations, edge hosting solutions, and high-performance site development.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://example.com/contact.html">
    <title>Contact Us - NexusTech</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="nav container">
            <a href="/" class="logo">NexusTech</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/contact.html" class="active">Contact</a></li>
                <li><a href="/privacy.html">Privacy</a></li>
            </ul>
        </nav>
    </header>

    <main class="container page-content">
        <h1>Contact Us</h1>
        <p>Looking to elevate your web presence? Send us a message below and our architecture team will get back to you immediately.</p>
        
        <!-- Cloudflare Turnstile or similar would go well here! -->
        <form class="contact-form" action="#" method="POST" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required placeholder="Jane Doe">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="jane@example.com">
            </div>
            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" required placeholder="How can we help?"></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-full">Send Message</button>
        </form>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <div class="logo">NexusTech</div>
            <ul class="footer-links">
                <li><a href="/privacy.html">Privacy Policy</a></li>
                <li><a href="/sitemap.xml">Sitemap</a></li>
            </ul>
            <p>&copy; 2026 NexusTech. All rights reserved.</p>
        </div>
    </footer>
    <script src="/js/script.js" defer></script>
</body>
</html>
